services:
  app:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shopify_roxor
      POSTGRES_USER: shopify_roxor
      POSTGRES_PASSWORD: shopify_roxor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopify_roxor -d shopify_roxor"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
